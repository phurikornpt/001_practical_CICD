apiVersion: monitoring.googleapis.com/v1beta
kind: RunMonitoring
metadata:
  name: example-service-api-v2   # ชื่อ service คุณ
spec:
  endpoints:
  - port: 8080          # ต้องตรงกับ Nest listen (ดูด้านล่าง)
    path: /metrics
    interval: 30s
  targetLabels:
    metadata:
    - service
    - revision