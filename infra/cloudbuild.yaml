steps:
  # 1. Build the Docker image
  # รูปแบบของ Artifact Registry: LOCATION-docker.pkg.dev/PROJECT_ID/REPO_NAME/IMAGE_NAME:TAG
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}', 
      '-f', 'infra/Dockerfile', 
      '.'
    ]

  # 2. Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'
    ]

  # 3. Deploy to Cloud Run: app container + GMP metrics sidecar
  #    Sidecar config is mounted from Secret Manager, not baked into an image.
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'beta', 'run', 'deploy', '${_SERVICE_NAME}',
      '--container', 'app',
      '--image', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}',
      '--port', '3000',
      '--memory', '512Mi',
      '--cpu', '1',
      '--container', 'collector',
      '--image', 'us-docker.pkg.dev/cloud-ops-agents-artifacts/cloud-run-gmp-sidecar/cloud-run-gmp-sidecar:1.2.0',
      '--memory', '256Mi',
      '--cpu', '0.5',
      '--set-secrets', '/etc/rungmp/config.yaml=${_GMP_CONFIG_SECRET}:latest',
      '--region', '${_LOCATION}',
      '--allow-unauthenticated',
      '--service-account', '${_RUNTIME_SA}'
    ]

options:
  logging: CLOUD_LOGGING_ONLY
# การใช้ 'images' ใน Cloud Build จะช่วยยืนยันว่า Artifact นี้จะถูกบันทึกใน Build History
images:
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'

# ตัวแปรเสริม (Substitutions) เพื่อให้จัดการง่าย
substitutions:
  _LOCATION: asia-southeast1   # หรือภูมิภาคที่คุณเลือก
  _REPO_NAME: practical-ci001   # ชื่อ Repository ที่คุณสร้างใน Artifact Registry
  _IMAGE_NAME: practic-ci-cd   # ชื่อ Image ที่ต้องการ
  _SERVICE_NAME: example-service-api   # ชื่อ Cloud Run service
  _GMP_CONFIG_SECRET: gmp-collector-config   # ชื่อ Secret ที่เก็บ collector config.yaml
  _RUNTIME_SA: hello-621@research-489512.iam.gserviceaccount.com   # SA ที่ Cloud Run service ใช้รัน (default compute SA ถูกลบไปแล้ว)